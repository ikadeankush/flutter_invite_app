name: invite_sender
description: Personalize invitation cards and send them from the host's own WhatsApp.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  image_picker: ^1.1.2       # pick the invitation card template image
  file_picker: ^10.3.7      # pick the guest list Excel file
  excel: ^4.0.6              # parse .xlsx guest lists
  screenshot: ^3.0.0         # rasterize the card+name widget into a PNG
  path_provider: ^2.1.4      # temp storage for generated card images
  permission_handler: ^11.3.1
  url_launcher: ^6.3.1       # wa.me fallback links (iOS / text-only cases)
  share_plus: ^10.1.2        # iOS share sheet fallback

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
